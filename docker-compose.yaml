services:
  redis:
    image: redis:latest
    container_name: commerce-redis
    ports:
      - "6380:6379"
    restart: always

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: commerce_redis_commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    restart: always
