spring:
  datasource:
    url: jdbc:h2:mem:commerce;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis 연결 설정 (로컬 기본값: localhost:6379)
  data:
    redis:
      host: localhost
      port: 6379
      # password: your_redis_password  # 인증이 필요한 경우 주석 해제

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    # 캐시 히트/미스 디버그 로그
    com.example.commerce.infrastructure.cache: DEBUG
